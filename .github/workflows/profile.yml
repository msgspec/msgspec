name: Profile

on:
  workflow_call:
    inputs:
      version:
        description: Version of msgspec to profile from PyPI (leave empty to use artifacts)
        type: string
      python:
        description: Minor version of Python to use for profiling
        type: string

jobs:
  profile:
    name: Profile ${{ startsWith(matrix.os, 'macos-') && 'macOS' || startsWith(matrix.os, 'windows-') && 'Windows' || 'Linux' }} (${{ matrix.archs }})
    runs-on: "${{ matrix.os }}"
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-24.04-arm
          archs: aarch64
        - os: ubuntu-latest
          archs: x86_64
        - os: macos-latest
          archs: arm64
        - os: macos-15-intel
          archs: x86_64
        - os: windows-latest
          archs: AMD64

    env:
      UV_NO_EDITABLE: "true"
      UV_NO_SYNC: "true"

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        persist-credentials: false

    - name: Fetch latest supported Python
      if: inputs.python == ''
      id: latest-supported-python
      uses: ./.github/actions/latest-supported-python
      with:
        github-token: "${{ github.token }}"

    - name: Install Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: "${{ inputs.python || steps.latest-supported-python.outputs.version }}"

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      with:
        enable-cache: false

    - name: Install command runner
      run: uv tool install rust-just

    - name: Set profiling environment metadata
      id: metadata
      env:
        PYTHON_VERSION: "${{ inputs.python || steps.latest-supported-python.outputs.version }}"
      shell: bash
      run: |-
        echo "UV_PYTHON=${PYTHON_VERSION}" >> "${GITHUB_ENV}"
        echo "python-version=${PYTHON_VERSION}" >> "${GITHUB_OUTPUT}"
        echo "env-path=$(just env-path prof)" >> "${GITHUB_OUTPUT}"

    - name: Install profiling dependencies
      env:
        UV_PROJECT_ENVIRONMENT: "${{ steps.metadata.outputs.env-path }}"
      run: uv sync --only-group test-prof

    - name: Download artifacts
      if: inputs.version == ''
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        # Profiling only downloads native wheels, whose build artifacts use
        # runner-and-architecture names.
        name: artifact-wheels-${{ matrix.os }}-${{ matrix.archs }}
        path: dist
        merge-multiple: true

    - name: Install from ${{ inputs.version == '' && 'artifact' || format('PyPI (version {0})', inputs.version) }}
      env:
        MSGSPEC_VERSION: "${{ inputs.version }}"
        VIRTUAL_ENV: "${{ steps.metadata.outputs.env-path }}"
      shell: bash
      run: |-
        if [ -z "${MSGSPEC_VERSION}" ]; then
          uv pip install --no-index --find-links dist msgspec
        else
          uv pip install "msgspec==${MSGSPEC_VERSION}"
        fi

    # TODO: set up infra to commit results after each merge and then make tests compare
    - name: Run profiling tests on Python ${{ steps.metadata.outputs.python-version }}
      run: just test-perf all --calibrate --rounds 10000
